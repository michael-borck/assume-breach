project:
  type: book
  output-dir: _book

book:
  title: "Assume Breach"
  subtitle: "A First Course in Defensive Security"
  author: "Michael Borck"
  date: today
  license: "CC BY"
  cover-image: images/cover.png
  favicon: favicon.svg
  page-navigation: true
  chapters:
    - index.qmd
    - copyright.qmd
    - acknowledgments.qmd
    - part: "Part I · Foundations"
      chapters:
        - chapters/01-introduction.qmd
        - chapters/02-software-security-and-malware.qmd
        - chapters/03-authentication-and-access.qmd
        - chapters/04-cryptography.qmd
    - part: "Part II · Managing Risk"
      chapters:
        - chapters/05-risk-management.qmd
        - chapters/06-incident-and-disaster-planning.qmd
    - part: "Part III · Defending Systems & Networks"
      chapters:
        - chapters/07-network-security.qmd
        - chapters/08-vpn-and-firewalls.qmd
        - chapters/09-web-security-and-data-protection.qmd
    - part: "Part IV · People & the Evolving Threat"
      chapters:
        - chapters/10-cybercrime-and-botnets.qmd
        - chapters/11-human-factors.qmd
    - part: "Part V · Putting It Together"
      chapters:
        - chapters/12-the-long-game.qmd
  appendices:
    - appendices/lab-environment.qmd
    - about-author.qmd
  other-links:
    - text: Download PDF
      icon: file-pdf
      href: assume-breach.pdf
    - text: Download EPUB
      icon: book
      href: assume-breach.epub
    - text: GitHub
      icon: github
      href: https://github.com/michael-borck/assume-breach
    - text: "Companion: Conversation, Not Delegation"
      icon: chat-left-text
      href: https://michael-borck.github.io/conversation-not-delegation/
    - text: All Books
      icon: collection
      href: https://books.borck.education

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    include-after-body: chatbot.html
    toc: true
    toc-depth: 3
    number-sections: true
  pdf:
    documentclass: book
    toc: true
    toc-depth: 1
    number-sections: true
    geometry:
      - paperwidth=6in
      - paperheight=9in
      - inner=1in
      - outer=0.625in
      - top=0.75in
      - bottom=0.75in
    include-in-header: pdf-header.tex
    include-before-body:
      - cover-page.tex
      - copyright-page.tex
